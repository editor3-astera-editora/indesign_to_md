# Configuração padrão do pipeline de tradução IDML PT→ES.
# Sobrescrita por overlays via --config no CLI idml-translate.

target_lang: es              # es | en | fr | it | de
model: gpt-4o-mini           # gpt-4o | gpt-4o-mini | gpt-4-turbo | gpt-3.5-turbo

# Batching: limites para cada chamada à API.
batch_max_segments: 30
batch_max_input_tokens: 3000
temperature: 0.2
max_completion_tokens: 4000

# Marcas/nomes próprios que NUNCA devem ser traduzidos.
# Match exato (case-sensitive) com o plain_text do segmento.
brand_names:
  - Astera
  - Astera Editora
  - InDesign
  - MathType
  - LaTeX
  - Microsoft
  - Google
  - IBGE
  - ABNT
  - ISO

# Estilos de parágrafo (do styles.default.yaml) cujo conteúdo NUNCA traduz.
# Útil para anchorings, créditos de imagem, rodapés, etc.
non_translatable_styles:
  - "Credito imagem"
  - "CREDITO_FOTOS"
  - "ANCORAGEM IMAGEM"
  - "ANCORAGEM IMAGENS"

# Estilos com kind:drop no styles.default.yaml (corretos para o Markdown, que
# regenera o TOC e descarta a capa) mas que DEVEM ser traduzidos na saída IDML —
# título da capa e entradas do sumário manual. Edite para ajustar à coleção;
# deixe como lista vazia ([]) para desligar o override.
translate_dropped_styles:
  - "Sumario:Folha de rosto"   # título da capa (pág. 1)
  - "Sumario:SUMARIO"
  - "Sumario:SUMARIO UNIDADE"
  - "Sumario:Item 1"
  - "Sumario:Item 1.1"

# Capa de unidade ("UNIDADE" + número) que vive SÓ no MasterSpread quando o
# designer não sobrepôs o frame na página (caso da Unidade 1). Ligado por padrão.
# false desliga a leitura de masters (volta ao comportamento antigo).
include_master_spreads: true

# Estilos de parágrafo que PODEM ser extraídos de Stories que só existem em
# masters. Restrito a capa para não traduzir cabeçalhos/rodapés/numeração.
master_cover_styles:
  - "Título capa"
  - "ESTILOS PRINCIPAIS:Título capa"

# Glossário determinístico da capa: plain_text exato → tradução fixa, aplicada
# ANTES da LLM (custo zero, sempre "UNIDAD"). O número é preservado pelo
# classifier. {} desliga o glossário.
cover_glossary:
  "UNIDADE": "UNIDAD"
  "Unidade": "Unidad"

# Sincronização sumário↔títulos de capítulo: passo determinístico DEPOIS da LLM
# que reescreve cada entrada do sumário para ficar idêntica ao título do capítulo
# traduzido (o corpo é a fonte da verdade). O sufixo de página (\t<página>) é
# preservado. false desliga o passo.
sync_toc_titles: true

# Estilos de parágrafo que são título de capítulo (fonte canônica). Restrito aos
# títulos de capítulo (nível 1); NÃO inclua T2/T3 a menos que o sumário liste
# seções. Para sincronizar seções, adicione "Títulos:T2"/"Títulos:T3" aqui e
# "Sumario:Item 1.1" em toc_entry_styles.
chapter_title_styles:
  - "Títulos:T1"
  - "Títulos:Titulo capítulos"
  - "Títulos:Seção Titulo"

# Estilos de parágrafo das entradas do sumário a sincronizar. Varia por coleção:
# Item 1 (ex.: Mat. Financeira) e/ou SUMARIO (ex.: Anatomia Humana). Entradas
# sem título de capítulo correspondente (cabeçalho "SUMÁRIO", "REFERÊNCIAS") são
# apenas ignoradas, sem efeito.
toc_entry_styles:
  - "Sumario:Item 1"
  - "Sumario:SUMARIO"
